name: Deploy Static PHP Site to FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files via FTP
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          
          echo "Connecting to FTP..."
          lftp -c "
          set ftp:ssl-allow no
          set net:max-retries 2
          set net:timeout 10
          set cmd:fail-exit yes
          open ftp://${{ secrets.FTP_SERVER }}
          user ${{ secrets.FTP_USERNAME }} '${{ secrets.FTP_PASSWORD }}'
          
          # If you create an FTP account specifically for this website, set its root directory to 
          # the folder for this domain (e.g. 'theglamhouseclinicandacademy.com') in Namecheap.
          # Then we just mirror to '/' (the root of that FTP user's access).
          # If using your main FTP account, change '/' below to '/theglamhouseclinicandacademy.com'
          mirror -Rnv \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob README.md \
            --exclude-glob *.md \
            --exclude-glob cleanup.js \
            --exclude-glob migrate.js \
            ./ /
          "
