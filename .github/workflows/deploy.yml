name: Deploy Static PHP Site to FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files via FTP
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          
          echo "Connecting to FTP..."
          lftp -c "
          set ftp:ssl-allow no
          set net:max-retries 2
          set net:timeout 10
          set cmd:fail-exit yes
          open ftp://${{ secrets.FTP_SERVER }}
          user ${{ secrets.FTP_USERNAME }} '${{ secrets.FTP_PASSWORD }}'
          
          # We mirror the entire root directory, but exclude .git, .github, and markdown docs
          mirror -Rnv \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob README.md \
            --exclude-glob *.md \
            --exclude-glob cleanup.js \
            --exclude-glob migrate.js \
            ./ /public_html
          "
